; ESP32-CAM (AI-Thinker, OV2640) — birbESP firmware.
;
; Flashing:  pio run -t upload -t monitor
; See firmware/README.md for wiring details.

[env:esp32cam]
platform = espressif32@^6.9.0
board = esp32cam
framework = arduino

monitor_speed = 115200
; 460800 is faster but unreliable with some ESP32-CAM-MB programmer shields
; (CH340 + supplied cable) — esptool reports "Serial data stream stopped".
; 115200 adds ~30 s but works on every setup.
upload_speed = 115200

build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue

; All required libraries (esp_camera, WiFi, HTTPClient, WebServer, ESPmDNS)
; are bundled with the ESP32 Arduino core — no lib_deps needed.
