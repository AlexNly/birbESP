<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116">
  <title>{% block title %}birbESP{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script defer src="/static/led.js"></script>
</head>
<body>
  <header class="topbar">
    <h1 class="brand">birb<span class="brand-accent">ESP</span></h1>
    {% block topbar_extra %}{% endblock %}
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Format every <time datetime="..."> in the user's locale + timezone.
    // Server stores UTC ISO; this turns it into something readable.
    //   data-fmt="time" -> HH:MM:SS only (thumb tags, pager)
    //   data-fmt="date" -> date only (back-links, headings)
    //   no data-fmt    -> full date + time
    document.addEventListener('DOMContentLoaded', function () {
      var fullFmt = new Intl.DateTimeFormat(undefined, {
        year: 'numeric', month: 'short', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false,
      });
      var timeFmt = new Intl.DateTimeFormat(undefined, {
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false,
      });
      var dateFmt = new Intl.DateTimeFormat(undefined, {
        year: 'numeric', month: 'short', day: '2-digit',
      });
      var fmtFor = function (which) {
        return which === 'time' ? timeFmt : which === 'date' ? dateFmt : fullFmt;
      };
      document.querySelectorAll('time[datetime]').forEach(function (el) {
        var d = new Date(el.getAttribute('datetime'));
        if (isNaN(d)) return;
        el.textContent = fmtFor(el.dataset.fmt).format(d);
      });
    });
  </script>

  <nav class="bottomnav">
    <a href="/" class="navlink {% if active == 'home' %}active{% endif %}">
      <span class="navicon">●</span><span>Home</span>
    </a>
    <a href="/live" class="navlink {% if active == 'live' %}active{% endif %}">
      <span class="navicon">▶</span><span>Live</span>
    </a>
    <a href="/highlights" class="navlink {% if active == 'highlights' %}active{% endif %}">
      <span class="navicon">★</span><span>Highlights</span>
    </a>
    <a href="/gallery" class="navlink {% if active == 'gallery' %}active{% endif %}">
      <span class="navicon">▦</span><span>Gallery</span>
    </a>
  </nav>
</body>
</html>
