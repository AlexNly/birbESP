{# Reusable LED control. Drop {% include "_led_control.html" %} into any page;
   the JS in static/led.js auto-binds every .led-control on the page. #}
<div class="led-control" data-led-control>
  <button class="led-btn" type="button" aria-pressed="false" data-led-btn>LED off</button>
  <div class="led-meta">
    <span class="led-status" data-led-status></span>
    <button class="led-keep-on" type="button" hidden data-led-keep-on>keep on</button>
  </div>
</div>
