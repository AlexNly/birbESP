{% extends "base.html" %}
{% block title %}birbESP — scrub{% endblock %}

{% block content %}
<section class="scrub">
  <div class="scrub-windows">
    {% for w in windows %}
      <a class="scrub-win{% if w == hours %} active{% endif %}" href="/scrub?hours={{ w }}">
        {% if w < 1 %}{{ (w * 60)|int }}m{% else %}{{ w|int }}h{% endif %}
      </a>
    {% endfor %}
  </div>

  <div class="scrub-box">
    <img id="scrubImg" class="hero-img" alt="frame">
    <div class="scrub-overlay">
      <span id="scrubTs" class="scrub-ts">loading…</span>
      <span id="scrubHl" class="pill pill-star" hidden>★</span>
    </div>
  </div>

  <div class="scrub-controls">
    <button id="scrubPlay" class="scrub-play" type="button" aria-label="Play">▶</button>
    <input id="scrubBar" class="scrub-bar" type="range" min="0" max="100" step="1" value="0" disabled>
    <select id="scrubSpeed" class="scrub-speed" aria-label="Playback speed">
      <option value="200">1×</option>
      <option value="100">2×</option>
      <option value="40" selected>5×</option>
      <option value="20">10×</option>
      <option value="10">20×</option>
      <option value="4">50×</option>
    </select>
  </div>

  <div class="scrub-actions">
    <label class="scrub-toggle">
      <input id="scrubHlOnly" type="checkbox"> jump only to highlights
    </label>
    <a id="scrubOpen" class="muted-link small" href="#">open this frame ↗</a>
  </div>

  <p id="scrubInfo" class="muted small"></p>
</section>

<script>
(function () {
  var sinceMs = {{ since_ms }};
  var untilMs = {{ until_ms }};
  var img   = document.getElementById('scrubImg');
  var bar   = document.getElementById('scrubBar');
  var ts    = document.getElementById('scrubTs');
  var hl    = document.getElementById('scrubHl');
  var play  = document.getElementById('scrubPlay');
  var speed = document.getElementById('scrubSpeed');
  var info  = document.getElementById('scrubInfo');
  var hlOnly = document.getElementById('scrubHlOnly');
  var openLink = document.getElementById('scrubOpen');

  var frames = [];          // full list
  var indices = [];         // indices into `frames` to actually iterate over
  var playing = false;
  var timer = null;
  var pos = 0;              // index into `indices`

  function fmt(ms) {
    var d = new Date(ms);
    return d.toLocaleString(undefined, {
      hour12: false, month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
    });
  }
  function show(p) {
    if (!indices.length) return;
    p = Math.max(0, Math.min(p, indices.length - 1));
    pos = p;
    bar.value = p;
    var f = frames[indices[p]];
    img.src = '/frames/' + f.filename;
    ts.textContent = fmt(f.ts_epoch_ms);
    hl.hidden = !f.is_highlight;
    openLink.href = '/frame/' + f.filename;
  }
  function rebuildIndices() {
    if (hlOnly.checked) {
      indices = frames
        .map(function (_, i) { return i; })
        .filter(function (i) { return frames[i].is_highlight; });
    } else {
      indices = frames.map(function (_, i) { return i; });
    }
    bar.max = Math.max(0, indices.length - 1);
    bar.disabled = indices.length === 0;
    play.disabled = indices.length === 0;
    if (!indices.length) {
      ts.textContent = 'no frames';
      img.removeAttribute('src');
      return;
    }
    show(indices.length - 1);
  }
  function startPlay() {
    if (playing || !indices.length) return;
    playing = true;
    play.textContent = '⏸';
    play.setAttribute('aria-label', 'Pause');
    var tick = function () {
      if (pos >= indices.length - 1) { stopPlay(); return; }
      show(pos + 1);
      timer = setTimeout(tick, parseInt(speed.value, 10));
    };
    tick();
  }
  function stopPlay() {
    playing = false;
    play.textContent = '▶';
    play.setAttribute('aria-label', 'Play');
    if (timer) { clearTimeout(timer); timer = null; }
  }

  play.addEventListener('click', function () { playing ? stopPlay() : startPlay(); });
  bar.addEventListener('input', function () { if (playing) stopPlay(); show(parseInt(bar.value, 10)); });
  speed.addEventListener('change', function () { if (playing) { stopPlay(); startPlay(); } });
  hlOnly.addEventListener('change', function () { stopPlay(); rebuildIndices(); });
  document.addEventListener('keydown', function (e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === ' ')        { e.preventDefault(); playing ? stopPlay() : startPlay(); }
    else if (e.key === 'ArrowLeft')  { stopPlay(); show(pos - 1); }
    else if (e.key === 'ArrowRight') { stopPlay(); show(pos + 1); }
    else if (e.key === 'Home')       { stopPlay(); show(0); }
    else if (e.key === 'End')        { stopPlay(); show(indices.length - 1); }
  });

  info.textContent = 'loading frames…';
  fetch('/api/frames?since=' + sinceMs + '&until=' + untilMs + '&max=2400')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      frames = (data && data.frames) || [];
      var hlc = frames.filter(function (f) { return f.is_highlight; }).length;
      info.textContent = frames.length
        ? frames.length + ' frames' + (data.sampled ? ' (sampled from ' + data.total + ')' : '')
          + ' · ' + hlc + ' highlights'
        : 'No frames in this window. Try a larger window.';
      rebuildIndices();
    })
    .catch(function (e) { info.textContent = 'Failed to load: ' + e; });
})();
</script>
{% endblock %}
