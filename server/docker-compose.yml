services:
  birbesp:
    build: .
    image: birbesp:latest
    container_name: birbesp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      BIRB_DATA_DIR: /app/data
      # URL the browser uses for the live MJPEG stream (ESP32 on LAN).
      # Override per-deployment, e.g.:
      #   ESP32_STREAM_URL=http://birb.local/stream
      ESP32_STREAM_URL: ${ESP32_STREAM_URL:-}
      # Mean-abs-difference threshold (0-255) for tagging a frame as a highlight.
      BIRB_HIGHLIGHT_THRESHOLD: ${BIRB_HIGHLIGHT_THRESHOLD:-2.0}
      # Rotate every incoming JPEG clockwise before storing/diff (0/90/180/270).
      BIRB_ROTATE: ${BIRB_ROTATE:-0}
      # Local TZ for grouping frames by date (e.g. Europe/Berlin). Default UTC.
      BIRB_TZ: ${BIRB_TZ:-UTC}
      # Retention windows. 0 or negative BIRB_RETAIN_DAYS disables pruning.
      BIRB_RETAIN_DAYS: ${BIRB_RETAIN_DAYS:-7}
      BIRB_RETAIN_HIGHLIGHT_DAYS: ${BIRB_RETAIN_HIGHLIGHT_DAYS:-30}
      BIRB_PRUNE_INTERVAL_S: ${BIRB_PRUNE_INTERVAL_S:-3600}
